{% extends 'productos/base.html' %}

{% block contenido %}
<h1>Bienvenido, {{ user.username }}</h1>
<p>Este es el estado actual de tu planta de Álava:</p>

<div style="display: flex; gap: 20px; margin-top: 30px;">
    
    <div style="flex: 1; background: #3498db; color: white; padding: 20px; border-radius: 10px; text-align: center;">
        <h3>📦 Productos</h3>
        <p style="font-size: 2em; margin: 0;">{{ total }}</p>
    </div>

    <div style="flex: 1; background: #2ecc71; color: white; padding: 20px; border-radius: 10px; text-align: center;">
        <h3>💰 Valor Total</h3>
        <p style="font-size: 2em; margin: 0;">{{ valor }}€</p>
    </div>

    <div style="flex: 1; background: #e74c3c; color: white; padding: 20px; border-radius: 10px; text-align: center;">
        <h3>⚠️ Alertas</h3>
        <p style="font-size: 2em; margin: 0;">{{ alertas }}</p>
    </div>

</div>

<div style="margin-top: 40px;">
    <a href="{% url 'listado' %}" style="padding: 15px 25px; background: #333; color: white; text-decoration: none; border-radius: 5px;">
        Gestionar Inventario →
    </a>
</div>
{% endblock %}
