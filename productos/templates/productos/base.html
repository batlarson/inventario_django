<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario Ibon AI</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background-color: #f4f4f4; }
        nav { background: #333; color: white; padding: 10px; margin-bottom: 20px; border-radius: 5px; }
        nav a { color: white; margin-right: 15px; text-decoration: none; font-weight: bold; }
        .contenedor { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        footer { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <nav>
        <a href="{% url 'bienvenida' %}">🏠 Inicio</a>
        <a href="{% url 'listado' %}">📋 Inventario</a>
        <a href="{% url 'crear' %}">➕ Nuevo Producto</a>
    </nav>

    <div class="contenedor">
        {% block contenido %}
        {% endblock %}
    </div>

    <footer style="margin-top: 20px; text-align: center; color: gray;">
        <hr>
        {% block pie %}
            © 2026 - Gestión de Inventario Ibon
        {% endblock %}
    </footer>

</body>
</html>
